name: Test Scrape (First 5)

on:
  workflow_dispatch:  # Allow manual triggering only

jobs:
  test-scrape:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      - name: Install Chrome
        run: |
          wget -q -O - https://dl-ssl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
          echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" | sudo tee /etc/apt/sources.list.d/google-chrome.list
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable
      
      - name: Install ChromeDriver
        run: |
          CHROME_VERSION=$(google-chrome --version | awk '{print $3}' | cut -d. -f1)
          CHROMEDRIVER_VERSION=$(curl -s "https://chromedriver.storage.googleapis.com/LATEST_RELEASE_$CHROME_VERSION")
          wget -q "https://chromedriver.storage.googleapis.com/$CHROMEDRIVER_VERSION/chromedriver_linux64.zip"
          unzip chromedriver_linux64.zip
          sudo mv chromedriver /usr/local/bin/
          sudo chmod +x /usr/local/bin/chromedriver
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install selenium openpyxl python-dotenv
      
      - name: Run test scraping script
        run: |
          python test_scrape.py
      
      - name: Commit incremental changes
        run: |
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "action@github.com"
          git add tradein_values.xlsx
          git commit -m "Test scrape results [skip ci]" || echo "No changes to commit"
          git push
      
      - name: Send email with Excel file
        run: python send_email.py
        env:
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}