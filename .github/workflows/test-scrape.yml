name: Test Scrape (First 5)

on:
  workflow_dispatch:  # Allow manual triggering only

# Add these permissions
permissions:
  contents: write

jobs:
  test-scrape:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0  # Fetch all history for proper git operations
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install selenium openpyxl python-dotenv webdriver-manager
      
      - name: Setup Chrome
        uses: browser-actions/setup-chrome@latest
        with:
          chrome-version: stable
      
      - name: Run test scraping script
        run: |
          python test_script.py
      
      - name: Commit incremental changes
        run: |
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "action@github.com"
          git add tradein_values.xlsx
          git commit -m "Test scrape results [skip ci]" || echo "No changes to commit"
          git push
      
      - name: Send email with Excel file
        run: python send_email.py
        env:
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}